kind = "web"
previewPath = "/"
title = "Zalith Launcher"
version = "1.0.0"
id = "artifacts/zalith-launcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25802

[services.development]
run = "pnpm --filter @workspace/zalith-launcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zalith-launcher", "run", "build" ]
publicDir = "artifacts/zalith-launcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25802"
BASE_PATH = "/"
